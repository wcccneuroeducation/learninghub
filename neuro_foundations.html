<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neuro Foundations</title>
<style>
:root{--cyan:#47f3ff;--purple:#9b5cff;--panel:rgba(7,22,42,.9);--line:rgba(107,232,255,.25)}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;padding:20px;display:grid;place-items:center;background:linear-gradient(180deg,#163451 0%,#0d2239 45%,#07111f 100%);font-family:Arial,sans-serif;color:#fff;text-align:center}
.card{width:min(92vw,720px);padding:36px;border-radius:24px;background:var(--panel);border:1px solid var(--line);box-shadow:0 0 24px rgba(71,243,255,.12)}
.icon{font-size:58px}
h1{margin:14px 0 10px;font-size:clamp(34px,7vw,54px)}
p{color:#d9e7ff;line-height:1.6;font-size:18px}
a{display:inline-block;margin-top:18px;padding:12px 18px;border-radius:12px;color:#fff;text-decoration:none;font-weight:800;background:rgba(255,255,255,.07);border:1px solid var(--line)}
a:hover{border-color:var(--cyan)}
</style>
</head>
<body>
<main class="card">
  <div class="icon">🧠</div>
  <h1>Neuro Foundations</h1>
  <p>The pathway is ready. The first learning modules will be added here next.</p>
  <a href="index.html">← Back to Learning Hub</a>
</main>
</body>
</html>
