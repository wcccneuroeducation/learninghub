<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anterior Isle Quiz</title>

<style>
:root{
  --cyan:#47f3ff;
  --purple:#9b5cff;
  --pink:#ff4fd8;
  --panel:rgba(8,18,35,.94);
  --line:rgba(107,232,255,.28);
  --muted:#c6d4e7;
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%}
body{
  min-height:100vh;
  padding:16px;
  font-family:Arial,sans-serif;
  color:#fff;
  text-align:center;
  background:linear-gradient(180deg,#050816,#0b1026);
}
button,select{font:inherit}
.hidden{display:none!important}

.card{
  width:min(100%,860px);
  margin:0 auto;
  padding:18px;
  border-radius:18px;
  background:var(--panel);
  border:1px solid var(--line);
  box-shadow:0 0 20px rgba(0,255,255,.16);
}

.quiz-header{
  display:grid;
  grid-template-columns:1fr auto;
  align-items:center;
  gap:12px;
  margin-bottom:16px;
  text-align:left;
}
.quiz-brand{
  display:flex;
  align-items:center;
  gap:10px;
}
.quiz-brand-icon{
  font-size:30px;
  filter:drop-shadow(0 0 8px rgba(71,243,255,.45));
}
.quiz-brand-title{
  font-size:24px;
  font-weight:900;
  letter-spacing:.6px;
}
.quiz-brand-title span{
  color:var(--cyan);
  text-shadow:0 0 8px rgba(71,243,255,.38);
}
.quiz-context{
  margin-top:2px;
  color:var(--muted);
  font-size:14px;
}
.map-link{
  padding:9px 13px;
  border-radius:11px;
  color:#fff;
  text-decoration:none;
  font-weight:800;
  white-space:nowrap;
  background:rgba(255,255,255,.05);
  border:1px solid var(--line);
}
.map-link:hover{border-color:var(--cyan)}

#setup{
  padding:8px 0 2px;
}
.setup-title{
  margin:4px 0 14px;
  font-size:clamp(26px,5vw,38px);
}
.setup-copy{
  margin:0 auto 18px;
  max-width:600px;
  color:var(--muted);
  line-height:1.5;
}
.category-row{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
}
select{
  min-width:180px;
  padding:12px 14px;
  color:#fff;
  background:#10233c;
  border:1px solid var(--line);
  border-radius:10px;
  font-size:17px;
}
.start-btn,.true-btn,.false-btn,.secondary-btn{
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-weight:900;
  transition:.18s ease;
}
.start-btn{
  padding:14px 22px;
  margin:16px 8px 4px;
  color:#06111f;
  background:linear-gradient(90deg,var(--cyan),#87f8ff);
}
.secondary-btn{
  padding:13px 18px;
  margin:8px;
  color:#fff;
  background:rgba(255,255,255,.07);
  border:1px solid var(--line);
}
.start-btn:hover,.secondary-btn:hover,.true-btn:hover,.false-btn:hover{
  transform:translateY(-2px);
}

#videoContainer{margin-top:8px}
#introVideo{
  width:100%;
  max-height:78vh;
  object-fit:contain;
  border-radius:12px;
}

.quiz-meta{
  display:flex;
  justify-content:space-between;
  gap:10px;
  margin:4px 0 10px;
  color:var(--muted);
  font-size:15px;
}
.progress-shell{
  height:8px;
  margin-bottom:15px;
  overflow:hidden;
  border-radius:999px;
  background:rgba(120,160,190,.18);
}
#questionProgressFill{
  width:0;
  height:100%;
  border-radius:999px;
  background:linear-gradient(90deg,var(--cyan),var(--purple));
  box-shadow:0 0 10px rgba(71,243,255,.35);
}
#question{
  min-height:210px;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:0;
  padding:24px;
  border-radius:14px;
  background:#fff;
  color:#07111f;
  font-size:clamp(26px,5.4vw,42px);
  line-height:1.3;
  font-weight:700;
  overflow-wrap:anywhere;
}
.answer-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
  margin-top:16px;
}
.true-btn,.false-btn{
  min-height:78px;
  padding:18px;
  margin:0;
  font-size:23px;
  color:#07111f;
}
.true-btn{background:#c9f4d1}
.false-btn{background:#f7cdcd}
#feedback{
  min-height:92px;
  margin:18px 4px 0;
  font-size:24px;
  line-height:1.35;
}
.small{
  color:#fff;
  font-size:18px;
  line-height:1.45;
}
#loadStatus{
  margin:12px 0 0;
  font-size:14px;
  color:var(--muted);
}

.finish-card{
  padding:8px 0 2px;
}
.finish-card h2{
  margin:4px 0 6px;
  font-size:clamp(30px,6vw,46px);
}
.finish-subtitle{
  color:var(--cyan);
  font-size:18px;
  font-weight:800;
}
.result-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
  margin:20px 0;
}
.result-item{
  padding:15px 10px;
  border-radius:14px;
  background:rgba(255,255,255,.05);
  border:1px solid var(--line);
}
.result-label{
  color:var(--cyan);
  font-size:12px;
  font-weight:800;
  text-transform:uppercase;
  letter-spacing:.5px;
}
.result-value{
  margin-top:6px;
  font-size:25px;
  font-weight:900;
}
.award{
  margin:16px auto;
  padding:14px;
  border-radius:13px;
  font-size:29px;
  font-weight:900;
}
.brain3{background:#9b59b6;color:#fff}
.brain2{background:#3498db;color:#fff}
.brain1{background:#6ab04c;color:#fff}
.noaward{background:#e5e7eb;color:#111827}
.finish-actions{
  display:flex;
  justify-content:center;
  gap:8px;
  flex-wrap:wrap;
}

@media(max-width:600px){
  body{padding:0}
  .card{
    min-height:100vh;
    padding:12px;
    border-radius:0;
    border-left:none;
    border-right:none;
  }
  .quiz-header{
    margin-bottom:10px;
  }
  .quiz-brand-icon{font-size:25px}
  .quiz-brand-title{font-size:21px}
  .quiz-context{font-size:12px}
  .map-link{
    padding:8px 10px;
    font-size:13px;
  }
  .setup-title{font-size:28px}
  .category-row{
    flex-direction:column;
  }
  select{width:100%;max-width:330px}
  #question{
    min-height:190px;
    padding:20px 16px;
    font-size:clamp(25px,7.6vw,35px);
  }
  .answer-row{gap:10px}
  .true-btn,.false-btn{
    min-height:74px;
    font-size:21px;
  }
  #feedback{
    min-height:82px;
    margin-top:14px;
    font-size:21px;
  }
  .small{font-size:16px}
  .result-grid{
    gap:8px;
  }
  .result-item{padding:12px 6px}
  .result-value{font-size:21px}
  .award{font-size:25px}
}
</style>

</head>
<body>
<div class="card">

  <header class="quiz-header">
    <div class="quiz-brand">
      <div class="quiz-brand-icon">🧠</div>
      <div>
        <div class="quiz-brand-title">NEURO <span>QUEST</span></div>
        <div id="quizContext" class="quiz-context">Anterior Isle</div>
      </div>
    </div>
    <a class="map-link" href="anterior_isle.html">← Map</a>
  </header>

  <div id="videoContainer" class="hidden">
    <video id="introVideo" controls>
      <source id="videoSource" src="" type="video/mp4">
    </video>
  </div>

  <section id="setup">
    <h1 class="setup-title">Choose your territory</h1>
    <p class="setup-copy">Watch the short introduction where available, then complete the true or false challenge.</p>

    <div class="category-row">
      <label for="categorySelect">Territory</label>
      <select id="categorySelect"></select>
    </div>

    <button class="start-btn" onclick="startIntro()">ENTER TERRITORY</button>
    <p id="loadStatus"></p>
  </section>

  <section id="quiz" class="hidden">
    <div class="quiz-meta">
      <span id="progress"></span>
      <span id="liveScore">Score: 0</span>
    </div>
    <div class="progress-shell"><div id="questionProgressFill"></div></div>

    <div id="question"></div>

    <div class="answer-row">
      <button class="true-btn" onclick="answerQuestion(true)">TRUE</button>
      <button class="false-btn" onclick="answerQuestion(false)">FALSE</button>
    </div>

    <div id="feedback"></div>
  </section>

  <section id="finish" class="hidden"></section>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getDatabase,
  ref,
  get,
  set,
  push
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDQOx2eQRwPFlHC2EmQREtdFYb9Mha7zuQ",
  authDomain: "neuro-itu-monitor-sim.firebaseapp.com",
  databaseURL: "https://neuro-itu-monitor-sim-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "neuro-itu-monitor-sim",
  storageBucket: "neuro-itu-monitor-sim.firebasestorage.app",
  messagingSenderId: "610257056899",
  appId: "1:610257056899:web:4763a538136eaf95a8d7b6"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

const APP_ROOT = "neuroQuest";

let allQuestions = [];
let quizQuestions = [];
let currentIndex = 0;
let score = 0;
let selectedCategory = "";
let playerName = "";
let currentUser = null;
let playerProgress = {};
let leaderboardCache = {};
let quizStartedAt = null;
let quizStartedAtMs = null;

onAuthStateChanged(auth, async user => {
  if (!user) {
    window.location.replace("../index.html");
    return;
  }

  currentUser = user;
  playerName = user.displayName || "NeuroQuest Player";

  await set(ref(db, `${APP_ROOT}/users/${user.uid}`), {
    displayName: playerName,
    email: user.email || "",
    lastLogin: new Date().toISOString()
  });

  await loadProgress();

  document.getElementById("loadStatus").textContent =
    "Ready to begin.";

  if (allQuestions.length > 0) {
    populateCategories();
  }
});

async function loadProgress() {
  if (!currentUser) return;

  const snap = await get(
    ref(db, `${APP_ROOT}/progress/${currentUser.uid}`)
  );

  playerProgress = snap.exists() ? snap.val() : {};
}

fetch("questions.csv")
  .then(response => {
    if (!response.ok) throw new Error("Could not load questions.csv");
    return response.text();
  })
  .then(csvText => {
    allQuestions = parseCSV(csvText);

    document.getElementById("loadStatus").innerHTML =
      "✅ Loaded " + allQuestions.length + " questions from CSV.";

    if (currentUser) {
      populateCategories();
    }
  })
  .catch(error => {
    document.getElementById("loadStatus").innerHTML =
      "❌ Could not load questions.csv. If testing locally, run through Live Server rather than double-clicking the HTML file.";
    console.error(error);
  });

function parseCSV(text) {
  const rows = [];
  let row = [];
  let current = "";
  let insideQuotes = false;

  for (let i = 0; i < text.length; i++) {
    const char = text[i];
    const nextChar = text[i + 1];

    if (char === '"' && insideQuotes && nextChar === '"') {
      current += '"';
      i++;
    } else if (char === '"') {
      insideQuotes = !insideQuotes;
    } else if (char === "," && !insideQuotes) {
      row.push(current);
      current = "";
    } else if ((char === "\n" || char === "\r") && !insideQuotes) {
      if (current !== "" || row.length > 0) {
        row.push(current);
        rows.push(row);
        row = [];
        current = "";
      }
      if (char === "\r" && nextChar === "\n") i++;
    } else {
      current += char;
    }
  }

  if (current !== "" || row.length > 0) {
    row.push(current);
    rows.push(row);
  }

  const headers = rows.shift().map(h => h.trim());

  return rows
    .filter(r => r.length > 1)
    .map(r => {
      let obj = {};
      headers.forEach((h, i) => obj[h] = (r[i] || "").trim());
      return obj;
    })
    .filter(q => q.Category && q.QuestionGroup && q.Question && q.Answer);
}

window.startIntro = function () {
  if (!currentUser) {
    window.location.replace("../index.html");
    return;
  }

  selectedCategory = document.getElementById("categorySelect").value;

  if (!selectedCategory) {
    alert("No category selected.");
    return;
  }

  let video = document.getElementById("introVideo");
  let videoFile = selectedCategory + "_intro.mp4";

  video.pause();
  video.removeAttribute("src");
  video.load();

  document.getElementById("videoContainer").classList.add("hidden");

  fetch(videoFile, { method: "HEAD" })
    .then(function (response) {
      if (!response.ok) {
        startQuiz();
        return;
      }

      document.getElementById("setup").classList.add("hidden");
      document.getElementById("videoContainer").classList.remove("hidden");

      video.src = videoFile;
      video.load();

      setTimeout(function () {
        document.getElementById("videoContainer").scrollIntoView({
          behavior: "smooth",
          block: "start"
        });
      }, 300);

      video.onended = function () {
        document.getElementById("videoContainer").classList.add("hidden");
        startQuiz();
      };

      video.play();
    })
    .catch(function () {
      document.getElementById("videoContainer").classList.add("hidden");
      startQuiz();
    });
};

async function populateCategories() {
  const select = document.getElementById("categorySelect");

  if (!currentUser) return;

  const previousChoice = select.value;

  const urlParams = new URLSearchParams(window.location.search);
  const requestedCategory = urlParams.get("category");

  const categories = [...new Set(allQuestions.map(q => q.Category.trim()))].sort();

  select.innerHTML = "";

  categories.forEach(cat => {
    let option = document.createElement("option");
    option.value = cat;

    if (isUnlocked(cat)) {
      option.textContent = cat;
      option.disabled = false;
    } else {
      option.textContent = "🔒 " + cat;
      option.disabled = true;
    }

    select.appendChild(option);
  });

  if (requestedCategory && isUnlocked(requestedCategory)) {
    select.value = requestedCategory;
  } else if (previousChoice && isUnlocked(previousChoice)) {
    select.value = previousChoice;
  } else if (isUnlocked("ICA")) {
    select.value = "ICA";
  }

  select.onchange = () => {
    document.getElementById("quizContext").textContent =
      "Anterior Isle • " + select.value;
  };

  document.getElementById("quizContext").textContent =
    "Anterior Isle • " + select.value;
}

function isCompleted(level) {
  return playerProgress[level] &&
         playerProgress[level].completed === true;
}

function isUnlocked(category) {
  if (category === "ICA") return true;

  if (category === "ACA" || category === "MCA") {
    return isCompleted("ICA");
  }

  if (category === "ACom") {
    return isCompleted("ACA") && isCompleted("MCA");
  }

  if (category === "AChA") {
    return isCompleted("ACom");
  }

  return false;
}

function startQuiz() {
  quizStartedAtMs = Date.now();
  quizStartedAt = new Date().toISOString();

  selectedCategory = document.getElementById("categorySelect").value;
  playerName = currentUser?.displayName || "NeuroQuest Player";
  document.getElementById("quizContext").textContent =
    "Anterior Isle • " + selectedCategory;

  let categoryQuestions = allQuestions.filter(q =>
    q.Category.trim().toUpperCase() === selectedCategory.trim().toUpperCase()
  );

  let grouped = {};

  categoryQuestions.forEach(q => {
    let groupKey = q.QuestionGroup.trim();
    if (!grouped[groupKey]) grouped[groupKey] = [];
    grouped[groupKey].push(q);
  });

  let oneFromEachGroup = Object.values(grouped).map(group => {
    return group[Math.floor(Math.random() * group.length)];
  });

  quizQuestions = shuffle(oneFromEachGroup).slice(0, 20);

  if (quizQuestions.length === 0) {
    alert("No questions found for this category.");
    return;
  }

  currentIndex = 0;
  score = 0;

  document.getElementById("setup").classList.add("hidden");
  document.getElementById("quiz").classList.remove("hidden");
  document.getElementById("finish").classList.add("hidden");

  showQuestion();
}

function showQuestion() {
  if (currentIndex >= quizQuestions.length) {
    finishQuiz();
    return;
  }

  let q = quizQuestions[currentIndex];

  const questionNumber = currentIndex + 1;
  const progressPercent = Math.round((currentIndex / quizQuestions.length) * 100);

  document.getElementById("progress").textContent =
    "Question " + questionNumber + " of " + quizQuestions.length;

  document.getElementById("liveScore").textContent =
    "Score: " + score;

  document.getElementById("questionProgressFill").style.width =
    progressPercent + "%";

  document.getElementById("question").innerHTML = q.Question;
  document.getElementById("feedback").innerHTML = "";
}

window.answerQuestion = function (choice) {
  let q = quizQuestions[currentIndex];
  let correctAnswer = q.Answer.trim().toUpperCase() === "TRUE";

  if (choice === correctAnswer) {
    score++;
    document.getElementById("feedback").innerHTML =
      "✅ Correct<br><span class='small'>" + q.Explanation + "</span>";
  } else {
    document.getElementById("feedback").innerHTML =
      "❌ Incorrect<br><span class='small'>" + q.Explanation + "</span>";
  }

  currentIndex++;
  setTimeout(showQuestion, 1700);
};

async function finishQuiz() {
  document.getElementById("questionProgressFill").style.width = "100%";
  document.getElementById("quiz").classList.add("hidden");

  let percent = Math.round((score / quizQuestions.length) * 100);
  let award = getAward(percent);

  const quizFinishedAt = new Date().toISOString();
  const rawDurationSeconds = quizStartedAtMs
    ? Math.round((Date.now() - quizStartedAtMs) / 1000)
    : 0;

  const durationSeconds = Math.min(
    Math.max(rawDurationSeconds, 30),
    1800
  );

  const durationMinutes = Math.round((durationSeconds / 60) * 10) / 10;

  await saveLevelProgress(selectedCategory, award, score, quizQuestions.length, percent);
  await saveScoreToLeaderboard(
    selectedCategory,
    score,
    quizQuestions.length,
    percent,
    award,
    quizStartedAt,
    quizFinishedAt,
    durationSeconds,
    durationMinutes
  );

  let finishHTML =
    "<div class='finish-card'>" +
      "<div class='finish-subtitle'>" + escapeHTML(selectedCategory) + " complete</div>" +
      "<h2>Challenge finished</h2>" +
      "<div class='result-grid'>" +
        "<div class='result-item'><div class='result-label'>Score</div><div class='result-value'>" +
          score + "/" + quizQuestions.length + "</div></div>" +
        "<div class='result-item'><div class='result-label'>Accuracy</div><div class='result-value'>" +
          percent + "%</div></div>" +
        "<div class='result-item'><div class='result-label'>Brains</div><div class='result-value'>" +
          award.brains + "</div></div>" +
      "</div>" +
      "<div class='award " + award.className + "'>" + award.emoji + " " + award.name + "</div>" +
      "<div class='finish-actions'>" +
        "<button class='secondary-btn' onclick='retryQuiz()'>Try again</button>" +
        "<button class='start-btn' onclick='returnToMap()'>Return to map</button>" +
      "</div>" +
    "</div>";

  document.getElementById("finish").innerHTML = finishHTML;
  document.getElementById("finish").classList.remove("hidden");
}

function getAward(percent) {
  if (percent >= 100) return { name: "3 Brains", emoji: "🧠🧠🧠", code: "B3", className: "brain3", brains: 3 };
  if (percent >= 80) return { name: "2 Brains", emoji: "🧠🧠", code: "B2", className: "brain2", brains: 2 };
  if (percent >= 70) return { name: "1 Brain", emoji: "🧠", code: "B1", className: "brain1", brains: 1 };
  return { name: "No brains yet", emoji: "🩺", code: "N", className: "noaward", brains: 0 };
}

async function saveLevelProgress(level, award, scoreValue, total, percent) {
  if (!currentUser) return;

  const existing = playerProgress[level] || {};
  const bestBrains = Math.max(existing.brains || 0, award.brains || 0);
  const bestPercent = Math.max(existing.bestPercent || 0, percent || 0);
  const bestScore = Math.max(existing.bestScore || 0, scoreValue || 0);

  const newProgress = {
    completed: bestBrains >= 2,
    brains: bestBrains,
    bestScore: bestScore,
    bestPercent: bestPercent,
    lastScore: scoreValue,
    lastPercent: percent,
    lastTotal: total,
    lastAward: award.name,
    updatedAt: new Date().toISOString()
  };

  playerProgress[level] = newProgress;

  await set(
    ref(db, `${APP_ROOT}/progress/${currentUser.uid}/${level}`),
    newProgress
  );
}

async function saveScoreToLeaderboard(
  category,
  scoreValue,
  total,
  percent,
  award,
  startedAt,
  finishedAt,
  durationSeconds,
  durationMinutes
) {
  if (!currentUser) return;

  const scoreData = {
    uid: currentUser.uid,
    name: playerName,
    category: category,
    score: scoreValue,
    total: total,
    percent: percent,
    awardName: award.name,
    awardEmoji: award.emoji,
    brains: award.brains,
    date: new Date().toLocaleString(),
    startedAt: startedAt,
    finishedAt: finishedAt,
    durationSeconds: durationSeconds,
    durationMinutes: durationMinutes,
    updatedAt: new Date().toISOString()
  };

  const bestRef = ref(db, `${APP_ROOT}/leaderboards/${category}/${currentUser.uid}`);
  const oldSnap = await get(bestRef);

  const oldScore = oldSnap.exists() ? oldSnap.val() : null;

  if (
    !oldScore ||
    percent > (oldScore.percent || 0) ||
    (
      percent === (oldScore.percent || 0) &&
      scoreValue > (oldScore.score || 0)
    ) ||
    (
      percent === (oldScore.percent || 0) &&
      scoreValue === (oldScore.score || 0) &&
      durationSeconds < (oldScore.durationSeconds || 999999)
    )
  ) {
    await set(bestRef, scoreData);
    leaderboardCache[category] = null;
  }

  await push(
    ref(db, `${APP_ROOT}/attempts/${currentUser.uid}`),
    scoreData
  );
}

async function getScoresForCategory(category) {
  if (leaderboardCache[category]) {
    return leaderboardCache[category];
  }

  const snap = await get(
    ref(db, `${APP_ROOT}/leaderboards/${category}`)
  );

  if (!snap.exists()) {
    leaderboardCache[category] = [];
    return [];
  }

  const scores = Object.values(snap.val())
    .sort((a, b) => {
      return (b.percent || 0) - (a.percent || 0) ||
             (b.score || 0) - (a.score || 0) ||
             (a.durationSeconds || 999999) - (b.durationSeconds || 999999);
    })
    .slice(0, 20);

  leaderboardCache[category] = scores;
  return scores;
}

function formatDuration(seconds) {
  seconds = Number(seconds || 0);

  if (!seconds) return "-";

  const mins = Math.floor(seconds / 60);
  const secs = seconds % 60;

  if (mins <= 0) {
    return secs + "s";
  }

  return mins + "m " + String(secs).padStart(2, "0") + "s";
}

function shuffle(array) {
  let copy = [...array];

  for (let i = copy.length - 1; i > 0; i--) {
    let j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }

  return copy;
}


window.retryQuiz = function () {
  document.getElementById("finish").classList.add("hidden");
  startQuiz();
};

window.returnToMap = function () {

function escapeHTML(value) {
  return String(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}
